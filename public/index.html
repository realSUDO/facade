<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACADE</title>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div class="container hand-drawn-box">
        <header>
            <h1>FACADE</h1>
            <div class="persona-selector">
                <button id="theme-toggle" class="hand-drawn-btn icon-btn" aria-label="Toggle Theme">
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20"
                        height="20" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20"
                        height="20">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="custom-dropdown hand-drawn-input" id="persona-dropdown">
                    <div class="dropdown-selected" id="dropdown-selected">Hitesh Choudhary</div>
                    <div class="dropdown-options hand-drawn-box" id="dropdown-options">
                        <div class="dropdown-option" data-value="persona1">Hitesh Choudhary</div>
                        <div class="dropdown-option" data-value="persona2">Piyush Garg</div>
                    </div>
                </div>
            </div>
        </header>

        <main id="chat-container" class="hand-drawn-box inner-box">
            <div id="chat-messages">
                <!-- Messages will appear here -->
                <div class="message-row" style="justify-content: center;">
                    <div class="message system-msg">Select a persona and say hi!</div>
                </div>
            </div>
        </main>

        <footer>
            <form id="chat-form">
                <input type="text" id="message-input" class="hand-drawn-input" placeholder="Type a message..." required
                    autocomplete="off">
                <button type="submit" class="hand-drawn-btn">Send</button>
            </form>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
